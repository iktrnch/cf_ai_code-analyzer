name = "code-analyzer"
main = "src/index.ts"
compatibility_date = "2026-03-06"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"

[[durable_objects.bindings]]
name = "AnalysisAgent"
class_name = "AnalysisAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["AnalysisAgent"]

[[workflows]]
name = "algorithm-analysis"
binding = "ANALYSIS_WORKFLOW"
class_name = "AlgorithmAnalysisWorkflow"

[assets]
directory = "../web/build"
